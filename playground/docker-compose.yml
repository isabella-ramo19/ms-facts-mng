services:
  # OPTIONAL CURRICULUM DATA API
  # Start with: docker compose --profile curriculum-data up -d shark-attack-data-api
  shark-attack-data-api:
    profiles: ["curriculum-data"]
    build:
      context: ./services/shark-attack-data-api
    image: nebulae-university/shark-attack-data-api:local
    ports:
      - "${SHARK_ATTACK_API_PORT:-8989}:8080"
    environment:
      PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  ##################################
  #### infrastructure SERVICES ####
  ##################################
  # BROKER
  broker-mqtt:
    image: eclipse-mosquitto:1.6
    ports:
     - "9001:9001"
     - "1883:1883"
    volumes:
      - NEBULAE_MQTT:/mosquitto/data          
  # MOGNO
  store-mongo:
    image: mongo:4
    ports:
    - "27017:27017"
    environment: 
        - storageEngine=wiredTiger
    volumes: 
      - NEBULAE_MONGO:/data/db
  # NATS-IO
  nats-io:
    image: nats:latest
    ports:
     - "4222:4222"
    command: -js -c /etc/nats/nats-server.conf
    volumes: 
      - NEBULAE_NATS:/nats/db
      - ./nats-server.conf:/etc/nats/nats-server.conf
  # REDIS
  redis:
    image: redis:7.0.11-alpine
    ports:
     - "6379:6379"
    command: redis-server --save 60 1000 --loglevel warning # dump the dataset to disk every 60 seconds if at least 1000 keys changed
    volumes: 
      - NEBULAE_REDIS:/data
 # KEYCLOAK
  keycloak_db:
    image: postgres:15
    ports:
      - "15432:15432"
    environment:
        - POSTGRES_DB=keycloak
        - POSTGRES_USER=keycloak
        - POSTGRES_PASSWORD=6jhVPaQWhgEMl0sXPnNmkLfS
        - POSTGRES_ROOT_PASSWORD=qgZqZGdoe5loJ0OrZvq36LBr
    volumes:
      - NEBULAE_KC:/var/lib/postgresql
      - NEBULAE_KC_DATA:/var/lib/postgresql/data
  keycloak:
      image: quay.io/keycloak/keycloak:21.1.2
      container_name: keycloak-1
      command: start-dev
      environment:
        - KEYCLOAK_ADMIN=admin
        - KEYCLOAK_ADMIN_PASSWORD=admin
        - KC_DB=postgres
        - KC_DB_URL=jdbc:postgresql://keycloak_db:5432/keycloak
        - KC_DB_USERNAME=keycloak
        - KC_DB_PASSWORD=6jhVPaQWhgEMl0sXPnNmkLfS
      links:
        - keycloak_db:postgres
      ports:
        - "8443:8443"
        - "8080:8080"
        - "9990:9990"
      # volumes:
      #   - ../keycloak-themes/themes:/opt/bitnami/keycloak/themes  
      depends_on:
      - keycloak_db
volumes: 
  NEBULAE_MQTT:
  NEBULAE_MONGO:
  NEBULAE_NATS:
  NEBULAE_REDIS:
  NEBULAE_KC:
  NEBULAE_KC_DATA:
  